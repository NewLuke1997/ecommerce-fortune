<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>跨境电商运势签 · 每日开运指南</title>
  <style>
/* ===== Reset & Base ===== */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #c0392b;
  --primary-dark: #96281b;
  --primary-light: #e74c3c;
  --gold: #d4a843;
  --gold-light: #f0d78c;
  --gold-dark: #b8922e;
  --bg: #0f0a06;
  --bg-card: #1a1209;
  --bg-card2: #221a0f;
  --text: #f5e6c8;
  --text-dim: #a08c6a;
  --text-muted: #6b5a40;
  --border: #3a2a15;
  --shadow: rgba(0,0,0,0.5);
  --radius: 16px;
  --radius-sm: 10px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* ===== Particles ===== */
.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.particle {
  position: absolute;
  border-radius: 50%;
  animation: float linear infinite;
  opacity: 0;
}

@keyframes float {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
}

/* ===== Header ===== */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(15, 10, 6, 0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  max-width: 900px;
  margin: 0 auto;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  font-size: 28px;
  filter: drop-shadow(0 0 8px rgba(212,168,67,0.5));
}

.logo-text {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 22px;
  color: var(--gold);
  letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(212,168,67,0.3);
}

.nav {
  display: flex;
  gap: 8px;
}

.nav-link {
  color: var(--text-dim);
  text-decoration: none;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 14px;
  transition: all 0.3s;
  border: 1px solid transparent;
}

.nav-link:hover, .nav-link.active {
  color: var(--gold);
  border-color: var(--gold-dark);
  background: rgba(212,168,67,0.1);
}

/* ===== Hero ===== */
.hero {
  padding: 120px 20px 40px;
  text-align: center;
  position: relative;
  z-index: 1;
}

.hero::before {
  content: '';
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(212,168,67,0.08) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.hero-badge {
  display: inline-block;
  padding: 6px 20px;
  background: linear-gradient(135deg, rgba(192,57,43,0.2), rgba(212,168,67,0.2));
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 13px;
  color: var(--gold);
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.hero-title {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(32px, 6vw, 52px);
  color: var(--gold);
  text-shadow: 0 0 40px rgba(212,168,67,0.3);
  margin-bottom: 12px;
  letter-spacing: 4px;
}

.hero-subtitle {
  color: var(--text-dim);
  font-size: 16px;
  font-weight: 300;
}

/* ===== Form Section ===== */
.form-section {
  max-width: 600px;
  margin: 0 auto;
  padding: 0 20px 40px;
  position: relative;
  z-index: 1;
}

.form-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: 0 20px 60px var(--shadow);
}

.form-header {
  text-align: center;
  margin-bottom: 28px;
}

.form-icon {
  font-size: 32px;
  display: block;
  margin-bottom: 8px;
}

.form-header h3 {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 24px;
  color: var(--gold);
  letter-spacing: 2px;
}

.form-group {
  margin-bottom: 24px;
}

.form-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 10px;
}

.label-icon {
  font-size: 18px;
}

/* Platform Grid */
.platform-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.platform-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 14px 8px;
  background: var(--bg-card2);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  font-family: inherit;
}

.platform-btn:hover {
  border-color: var(--gold-dark);
  background: rgba(212,168,67,0.08);
  color: var(--text);
  transform: translateY(-2px);
}

.platform-btn.selected {
  border-color: var(--gold);
  background: rgba(212,168,67,0.15);
  color: var(--gold);
  box-shadow: 0 0 20px rgba(212,168,67,0.15);
  transform: translateY(-2px);
}

.platform-emoji {
  font-size: 28px;
  transition: transform 0.3s;
}

.platform-btn.selected .platform-emoji {
  transform: scale(1.15);
}

.platform-name {
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
}

/* Input */
.form-input {
  width: 100%;
  padding: 14px 16px;
  background: var(--bg-card2);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: all 0.3s;
}

.form-input::placeholder {
  color: var(--text-muted);
}

.form-input:focus {
  border-color: var(--gold-dark);
  box-shadow: 0 0 0 3px rgba(212,168,67,0.1);
}



/* Draw Button */
.draw-btn {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 18px;
  font-family: 'Ma Shan Zheng', cursive;
  font-weight: 400;
  letter-spacing: 4px;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
  margin-top: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.draw-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1), transparent);
  transform: translateX(-100%);
  transition: transform 0.6s;
}

.draw-btn:hover::before {
  transform: translateX(100%);
}

.draw-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(192,57,43,0.4);
}

.draw-btn:active {
  transform: translateY(0);
}

.draw-btn.loading {
  pointer-events: none;
  opacity: 0.8;
}

.draw-btn-sparkle {
  font-size: 20px;
  animation: sparkle 2s ease-in-out infinite;
}

@keyframes sparkle {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.2); }
}

/* ===== Result Section ===== */
.result-section {
  max-width: 700px;
  margin: 0 auto;
  padding: 0 20px 60px;
  position: relative;
  z-index: 1;
}

.result-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 36px 28px;
  box-shadow: 0 20px 80px var(--shadow);
  animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

.result-header {
  text-align: center;
  margin-bottom: 30px;
}

.result-badge {
  display: inline-block;
  padding: 6px 20px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 12px;
  letter-spacing: 1px;
}

.result-badge.great {
  background: linear-gradient(135deg, rgba(46,204,113,0.2), rgba(39,174,96,0.2));
  border: 1px solid rgba(46,204,113,0.3);
  color: #2ecc71;
}

.result-badge.good {
  background: linear-gradient(135deg, rgba(52,152,219,0.2), rgba(41,128,185,0.2));
  border: 1px solid rgba(52,152,219,0.3);
  color: #3498db;
}

.result-badge.normal {
  background: linear-gradient(135deg, rgba(241,196,15,0.2), rgba(243,156,18,0.2));
  border: 1px solid rgba(241,196,15,0.3);
  color: #f1c40f;
}

.result-badge.caution {
  background: linear-gradient(135deg, rgba(231,76,60,0.2), rgba(192,57,43,0.2));
  border: 1px solid rgba(231,76,60,0.3);
  color: #e74c3c;
}

.result-title {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 32px;
  color: var(--gold);
  letter-spacing: 3px;
  margin-bottom: 8px;
}

.result-date {
  color: var(--text-dim);
  font-size: 14px;
}

/* Fortune Blocks */
.overall-fortune {
  text-align: center;
  padding: 28px 20px;
  background: linear-gradient(135deg, rgba(212,168,67,0.08), rgba(192,57,43,0.08));
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 24px;
}

.fortune-icon {
  font-size: 36px;
  margin-bottom: 8px;
}

.fortune-block h4 {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 18px;
  color: var(--gold-light);
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.fortune-stars {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin-bottom: 12px;
  font-size: 20px;
}

.fortune-text {
  color: var(--text);
  font-size: 14px;
  line-height: 1.8;
}

.fortune-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}

.fortune-grid .fortune-block {
  padding: 20px 16px;
  background: var(--bg-card2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  transition: all 0.3s;
}

.fortune-grid .fortune-block:hover {
  border-color: var(--gold-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px var(--shadow);
}

.fortune-grid .fortune-icon {
  font-size: 28px;
  margin-bottom: 6px;
}

.fortune-tag {
  display: inline-block;
  margin-top: 10px;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
}

.fortune-tag.yes {
  background: rgba(46,204,113,0.15);
  color: #2ecc71;
  border: 1px solid rgba(46,204,113,0.2);
}

.fortune-tag.no {
  background: rgba(231,76,60,0.15);
  color: #e74c3c;
  border: 1px solid rgba(231,76,60,0.2);
}

.fortune-tag.maybe {
  background: rgba(241,196,15,0.15);
  color: #f1c40f;
  border: 1px solid rgba(241,196,15,0.2);
}

/* Lucky Section */
.lucky-section {
  padding: 24px;
  background: var(--bg-card2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 24px;
}

.lucky-section h4 {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 20px;
  color: var(--gold);
  margin-bottom: 16px;
  text-align: center;
  letter-spacing: 2px;
}

.lucky-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.lucky-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 12px 8px;
  background: rgba(0,0,0,0.2);
  border-radius: 10px;
}

.lucky-label {
  font-size: 12px;
  color: var(--text-muted);
}

.lucky-value {
  font-size: 15px;
  font-weight: 500;
  color: var(--gold-light);
}

.lucky-value.good { color: #2ecc71; }
.lucky-value.bad { color: #e74c3c; }

/* Poem */
.poem-section {
  text-align: center;
  padding: 24px;
  margin-bottom: 24px;
}

.poem-decoration {
  color: var(--gold-dark);
  font-size: 24px;
  line-height: 1;
  opacity: 0.5;
}

.poem-text {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 20px;
  color: var(--gold-light);
  line-height: 2;
  letter-spacing: 3px;
  margin: 8px 0;
  text-shadow: 0 0 20px rgba(212,168,67,0.2);
}

/* Actions */
.result-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.action-btn {
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 2px solid var(--border);
  background: var(--bg-card2);
  color: var(--text);
}

.action-btn:hover {
  border-color: var(--gold-dark);
  background: rgba(212,168,67,0.1);
  transform: translateY(-2px);
}

.action-btn.primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-color: var(--primary);
  color: #fff;
}

.action-btn.primary:hover {
  box-shadow: 0 6px 20px rgba(192,57,43,0.4);
}

/* ===== Toast ===== */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: 12px 28px;
  background: var(--bg-card);
  border: 1px solid var(--gold-dark);
  border-radius: 30px;
  color: var(--gold);
  font-size: 14px;
  z-index: 200;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== Footer ===== */
.footer {
  text-align: center;
  padding: 30px 20px;
  border-top: 1px solid var(--border);
  position: relative;
  z-index: 1;
}

.footer-inner p {
  color: var(--text-muted);
  font-size: 13px;
  margin-bottom: 4px;
}

.footer-sub a {
  color: var(--gold-dark);
  text-decoration: none;
}

.footer-sub a:hover {
  color: var(--gold);
}

/* ===== Responsive ===== */
@media (max-width: 600px) {
  .platform-grid {
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .platform-btn {
    padding: 10px 4px;
  }

  .platform-emoji { font-size: 24px; }
  .platform-name { font-size: 10px; }

  .form-card, .result-card {
    padding: 24px 18px;
  }

  .fortune-grid {
    grid-template-columns: 1fr;
  }

  .lucky-grid {
    grid-template-columns: repeat(3, 1fr);
  }

  .result-actions {
    flex-direction: column;
  }

  .action-btn {
    justify-content: center;
  }
}

@media (max-width: 380px) {
  .platform-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

</style>

            <span class="platform-name">TikTok Shop</span>

  </section>

  <!-- Fortune Result -->
  <section class="result-section" id="resultSection" style="display:none;">
    <div class="result-card">
      <div class="result-header">

      <div class="fortune-grid">

function createParticles() {
  const container = document.getElementById('particles');
  const colors = ['rgba(212,168,67,0.3)', 'rgba(192,57,43,0.2)', 'rgba(240,215,140,0.2)'];
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 2;
    p.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      animation-duration: ${Math.random() * 15 + 10}s;
      animation-delay: ${Math.random() * 10}s;
    `;
    container.appendChild(p);
  }
}

function initPlatformButtons() {
  document.querySelectorAll('.platform-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedPlatform = btn.dataset.platform;
    });
  });
}

function initDateInput() {
  const dateInput = document.getElementById('birthdate');
  // Auto-insert dashes as user types
  dateInput.addEventListener('input', function() {
    let v = this.value.replace(/[^0-9]/g, '');
    if (v.length > 4) v = v.slice(0,4) + '-' + v.slice(4);
    if (v.length > 7) v = v.slice(0,7) + '-' + v.slice(7);
    this.value = v.slice(0, 10);
  });
}

// ===== Seeded Random =====
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function getDateSeed(name, birthdate, platform) {
  const today = new Date();
  const dateStr = `${today.getFullYear()}${today.getMonth()}${today.getDate()}`;
  const str = `${name}${birthdate}${platform}${dateStr}`;
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    const ch = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + ch;
    hash = hash & hash;
  }
  return Math.abs(hash) + 1;
}

function pick(arr, rng) {
  return arr[Math.floor(rng() * arr.length)];
}

function pickLevel(rng) {
  const weights = [0.15, 0.30, 0.30, 0.18, 0.07];
  const r = rng();
  let sum = 0;
  for (let i = 0; i < weights.length; i++) {
    sum += weights[i];
    if (r < sum) return FORTUNE_DATA.levels[i];
  }
  return FORTUNE_DATA.levels[2];
}

function drawFortune() {
  const name = document.getElementById('username').value.trim();
  const birthdate = document.getElementById('birthdate').value;

  if (!selectedPlatform) { showToast('⚠️ 请选择一个电商平台'); return; }
  if (!name) { showToast('⚠️ 请输入你的名字'); return; }
  if (!birthdate) { showToast('⚠️ 请选择出生日期'); return; }

  // Loading animation
  const btn = document.getElementById('drawBtn');
  btn.classList.add('loading');
  btn.querySelector('.draw-btn-text').textContent = '🎋 抽签中...';

  setTimeout(() => {
    btn.classList.remove('loading');
    btn.querySelector('.draw-btn-text').textContent = '🎋 开始抽签';
    generateFortune(name, birthdate, selectedPlatform);
  }, 1500);
}

function generateFortune(name, birthdate, platform) {
  const seed = getDateSeed(name, birthdate, platform);
  const rng = seededRandom(seed);

  const level = pickLevel(rng);
  const platformNames = {
    amazon: 'Amazon', shopee: 'Shopee', lazada: 'Lazada',
    tiktok: 'TikTok Shop', temu: 'Temu', shein: 'SHEIN',
    ebay: 'eBay', aliexpress: 'AliExpress',
    ozon: 'OZON', mercadolibre: 'MercadoLibre',
  };

  // Badge
  const badgeEl = document.getElementById('resultBadge');
  badgeEl.textContent = `${platformNames[platform]} · ${level.name}日`;
  badgeEl.className = `result-badge ${level.badge}`;

  // Title
  document.getElementById('resultTitle').textContent = `${name}的今日运势`;

  // Date
  const today = new Date();
  document.getElementById('resultDate').textContent =
    `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日 · ${['日','一','二','三','四','五','六'][today.getDay()]}`;

  // Overall
  document.getElementById('overallIcon').textContent = level.icon;
  document.getElementById('overallStars').textContent =
    '★'.repeat(level.stars) + '☆'.repeat(5 - level.stars);
  document.getElementById('overallText').textContent = pick(FORTUNE_DATA.overall[level.badge], rng);

  // Fortunes
  const categories = ['ad', 'stock', 'price', 'product', 'logistics', 'service'];
  categories.forEach(cat => {
    const data = pick(FORTUNE_DATA[cat === 'ad' ? 'ads' : cat][level.badge], rng);
    document.getElementById(`${cat}Text`).textContent = data.text;
    const tagEl = document.getElementById(`${cat}Tag`);
    tagEl.textContent = data.tag;
    tagEl.className = `fortune-tag ${data.tagType}`;
  });

  // Lucky items
  document.getElementById('luckyColor').textContent = pick(FORTUNE_DATA.colors, rng);
  document.getElementById('luckyNumber').textContent = pick(FORTUNE_DATA.numbers, rng);
  document.getElementById('luckyTime').textContent = pick(FORTUNE_DATA.times, rng);
  document.getElementById('luckyGood').textContent = pick(FORTUNE_DATA.goods, rng);
  document.getElementById('luckyBad').textContent = pick(FORTUNE_DATA.bads, rng);

  // Poem
  document.getElementById('poemText').textContent = pick(FORTUNE_DATA.poems[level.badge], rng);

  // Show result
  const section = document.getElementById('resultSection');
  section.style.display = 'block';
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ===== Share =====
function shareFortune() {
  const name = document.getElementById('resultTitle').textContent;
  const badge = document.getElementById('resultBadge').textContent;
  const text = `🏮 跨境电商运势签\n\n${name}\n${badge}\n\n广告：${document.getElementById('adTag').textContent}\n库存：${document.getElementById('stockTag').textContent}\n选品：${document.getElementById('productTag').textContent}\n\n快来测测你的今日电商运势 👉`;

  if (navigator.share) {
    navigator.share({ title: '跨境电商运势签', text });
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('📋 运势已复制到剪贴板！'));
  }
}

// ===== Toast =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

</script>
